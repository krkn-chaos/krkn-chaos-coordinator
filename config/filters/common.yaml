# Common chaos relevance filter keywords — shared across all agents.
# Agent-specific keywords go in each agent's YAML (config/agents/<name>.yaml).

skip_keywords:
  - "CVE-"
  - "security tracking"
  - "vulnerability"
  - "flaky test"
  - "test infrastructure"
  - "ci failure"
  - "test fix"
  - "documentation"
  - "typo"
  - "backport"
  - "cherry-pick"
  - "cherry pick"
  - "bump to"
  - "bump "
  - "rebase"
  - "vendor update"
  - "dependency update"
  - "[stub]"
  - "e2e test"
  - "skopeo"
  - "below the sea ui"
  - "dpll pin"


chaos_keywords:
  # Component crash/restart
  - "crash"
  - "panic"
  - "oom"
  - "out of memory"
  - "oom kill"
  - "deadlock"
  - "crashloop"
  - "restart loop"

  # Timeouts and degradation
  - "timeout"
  - "timed out"
  - "context deadline"
  - "unavailable"
  - "degraded"
  - "unhealthy"
  - "not ready"

  # Performance degradation
  - "slow"
  - "latency increased"
  - "high latency"
  - "p99"
  - "p95"
  - "response time"
  - "throughput"
  - "performance degradation"
  - "performance regression"

  # Cluster health
  - "cluster operator"
  - "clusteroperator"
  - "co degraded"
  - "co unavailable"
  - "operator degraded"
  - "operator unavailable"
  - "cluster unhealthy"

  # Consensus and leadership
  - "quorum"
  - "leader election"
  - "split brain"

  # Node failures
  - "node drain"
  - "node reboot"
  - "node delete"
  - "node replace"
  - "node failure"
  - "node not ready"

  # Network disruption
  - "network partition"
  - "latency"
  - "packet loss"
  - "dns failure"
  - "connection refused"
  - "connection reset"
  - "connection timeout"

  # Service disruption
