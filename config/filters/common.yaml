  # Scaling
  - "scale up failed"
  - "autoscaler"
  - "pending pods"
  - "scheduling failed"
  - "insufficient resources"
  - "node pressure"
  - "capacity"

  # Pod disruption
  - "pod eviction"
  - "pod kill"
